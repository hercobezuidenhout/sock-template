name: Beta Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      HAVE_VSCE_PAT: ${{ secrets.VSCE_PAT != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Get PR labels
        id: pr_labels
        run: |
          # Check if this push came from a PR merge
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Extract PR number from merge commit message (e.g., "Merge pull request #123")
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '(?<=#)\d+' | head -1)

          if [ -n "$PR_NUMBER" ]; then
            # This was a PR merge, get the labels
            LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name' | tr '\n' ',')
            echo "labels=$LABELS" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER merged (labels: $LABELS)"
          else
            # Direct push to main, no labels
            echo "labels=" >> $GITHUB_OUTPUT
            echo "Direct push to main (no PR labels)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LABELS="${{ steps.pr_labels.outputs.labels }}"

          # Parse current version
          if [[ $CURRENT =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            BETA="${BASH_REMATCH[5]}"
          else
            echo "Invalid version format: $CURRENT"
            exit 1
          fi

          echo "Parsed version: $MAJOR.$MINOR.$PATCH${BETA:+-beta.$BETA}"

          # Check for bump labels
          HAS_MAJOR=$(echo "$LABELS" | grep -o "bump:major" || true)

          if [ -z "$BETA" ]; then
            # Current version is stable - first beta after stable
            if [ -n "$HAS_MAJOR" ]; then
              # Major bump
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              # Minor bump (default)
              MINOR=$((MINOR + 1))
              PATCH=0
              BETA=1
            fi
          else
            # Current version is already beta
            if [ -n "$HAS_MAJOR" ]; then
              # Breaking change - do major bump if not already done
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              # Just increment beta counter
              BETA=$((BETA + 1))
            fi
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.$BETA"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          npm version $NEW_VERSION --no-git-tag-version
          echo "Updated package.json to $NEW_VERSION"

      - name: Commit version bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          NEW="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "bump: From v$CURRENT to v$NEW"
          git push origin main

      - name: Create git tag
        run: |
          NEW="${{ steps.version.outputs.version }}"
          git tag "v$NEW"
          git push origin "v$NEW"

      - name: Build extension
        run: |
          npx @vscode/vsce package --pre-release

      - name: Extract CHANGELOG for release
        id: changelog
        run: |
          # Extract content between ## [Unreleased] and the next ## heading
          CHANGELOG_CONTENT=$(sed -n '/## \[Unreleased\]/,/^## \[/{ /^## \[Unreleased\]/d; /^## \[/d; p; }' CHANGELOG.md | sed '/^$/d')

          # Create release notes with CHANGELOG content
          cat > release_notes.md <<EOF
          **Pre-release version** - Install from the VSIX file below or enable pre-release versions in VS Code.

          ## Changes in this release

          $CHANGELOG_CONTENT
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTENSION_NAME=$(node -p "require('./package.json').name")
          gh release create "v${{ steps.version.outputs.version }}" \
            ./${EXTENSION_NAME}-${{ steps.version.outputs.version }}.vsix \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --prerelease \
            --generate-notes

      - name: Publish to VS Code Marketplace
        if: ${{ env.HAVE_VSCE_PAT == 'true' }}
        run: |
          npx @vscode/vsce publish --pre-release --pat ${{ secrets.VSCE_PAT }}
